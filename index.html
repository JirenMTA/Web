<!doctype html>
<html lang="vi">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Gửi đến Nhung 💌</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="hearts" aria-hidden="true" id="hearts"></div>

  <main class="wrap">
    <section class="card">
      <div class="badge"><span class="dot"></span> Một điều anh muốn nói với em…</div>
      <h1 id="title">Gửi <span class="accent">Em</span> 💗</h1>
      <p class="sub">Có thể hơi ngại, nhưng anh muốn nói rõ ràng một lần cho đúng.</p>

      <div class="grid">
        <div class="box">
          <p class="type" id="typeArea"></p>

          <div class="meta">
            <span class="chip">📍 Từ: <b id="fromName">Anh</b></span>
            <span class="chip">📅 Ngày: <b id="today"></b></span>
            <span class="chip">💌 Mật mã: <b id="code">LOVE-2025</b></span>
          </div>

          <div class="actions">
            <button class="yes" id="btnYes">Đồng ý 💕</button>
            <button class="no" id="btnNo">Không đâu 🙈</button>
            <button class="ghost" id="btnNote">Đọc thêm một chút ✨</button>
          </div>
        </div>

        <aside class="right">
          <div class="photo">
            <div class="hint">
              <img
                src="https://scontent.fthd2-4.fna.fbcdn.net/v/t39.30808-6/484901514_1697483277505070_1338902325686328086_n.jpg?_nc_cat=111&ccb=1-7&_nc_sid=cc71e4&_nc_eui2=AeGSD80jgfQUBMfEEBjUl0ZhzDJozi0JGSXMMmjOLQkZJffNg2MuBHf3ydrJ7JJ6RyOf8jzEt5LJXvUhSS5dY348&_nc_ohc=N_u6qM2tl-IQ7kNvwHKnsaN&_nc_oc=Admd1GdV7u_hk24LSQSlWlcNptC-x7wBo2E2YMJ2-DfZnViXQDy-zlAU-4kOtYECWyI&_nc_zt=23&_nc_ht=scontent.fthd2-4.fna&_nc_gid=D_qxo83TnQjy2rC7nzR1nw&oh=00_AfmklueB7ffoJlQAK0dbu5LnfJQ-jTbEUPuhKBcaI_QyzQ&oe=694C916B"
                alt="❤️" class="icon-heart" />
              <img src="./hung.jfif" />
            </div>

            <!-- Nếu muốn dùng ảnh: mở comment và sửa đường dẫn
            <img src="your-photo.jpg" alt="Ảnh của chúng mình" />
            -->
          </div>

          <div class="box">
            <div class="countdown" id="countdown">
              <div class="tile"><b id="d">0</b><span>Days</span></div>
              <div class="tile"><b id="h">0</b><span>Hours</span></div>
              <div class="tile"><b id="m">0</b><span>Minutes</span></div>
              <div class="tile"><b id="s">0</b><span>Seconds</span></div>
            </div>
            <p class="sub center">⏳ Đếm ngược tới “lời hẹn”</p>
          </div>
        </aside>
      </div>

      <div class="footer">
        <span>Made with HUNG_MTA💗</span>
        <span>Tip: Thách em bấm “Không đâu” đấy 😛</span>
      </div>
    </section>
  </main>

  <!-- ✅ Meme sound (đổi đường dẫn theo file của bạn) -->
  <!-- Gợi ý: đặt file tại ./sounds/meme.mp3 -->
  <audio id="memeAudio" src="No.mp3" preload="auto"></audio>

  <!-- ✅ Sound cho "Đồng ý" & "Suy nghĩ thêm" (đổi đường dẫn theo file của bạn) -->
  <!-- Gợi ý: đặt file tại ./sounds/yes.mp3 và ./sounds/later.mp3 -->
  <audio id="yesAudio" src="Yes.mp3" preload="auto"></audio>
  <audio id="laterAudio" src="Later.mp3" preload="auto"></audio>

  <!-- ✅ Sound cho "Đọc thêm một chút" (đổi đường dẫn theo file của bạn) -->
  <!-- Gợi ý: đặt file tại ./sounds/note.mp3 -->
  <audio id="noteAudio" src="Later.mp3" preload="auto"></audio>

  <!-- Modal -->
  <div class="modal" id="modal">
    <div class="panel">
      <button class="close" id="btnClose" aria-label="Đóng">✕</button>
      <h2>Thật ra là…</h2>
      <p id="moreText"></p>
      <div class="row">
        <button class="yes" id="btnOk">Ừm… em cũng vậy 💘</button>
        <button class="no" id="btnLater">Cho em suy nghĩ thêm 😳</button>
      </div>
    </div>
  </div>

  <div class="confetti" id="confetti" aria-hidden="true"></div>

  <script>
    // ====== TUỲ CHỈNH NHANH Ở ĐÂY ======
    const toName = "Em";
    const fromName = "Anh";
    const secretCode = "LOVE-2025";

    // Ngày “lời hẹn” để đếm ngược (đổi theo ý bạn)
    // Ví dụ: new Date("2026-01-01T00:00:00")
    const targetDate = new Date("2026-01-01T00:00:00");

    const message =
      `Em biết không…
Mỗi lần nói chuyện với em, anh đều thấy ngày hôm đó vui hơn một chút.

Anh không giỏi nói những lời sến súa,
nhưng anh nghiêm túc muốn hỏi:

Em có muốn làm người yêu anh không? 💗`;

    const moreMessage = `Nếu em đồng ý, anh hứa sẽ:<br><br>
• Quan tâm em bằng những điều nhỏ nhất<br>
• Lắng nghe em nhiều hơn<br>
• Và luôn đứng về phía em<br><br>
Còn nếu em chưa sẵn sàng,<br>
thì anh vẫn muốn được ở cạnh em—như một người đặc biệt.`;


    // ====== HIỂN THỊ NỘI DUNG ======
    document.querySelector("#title .accent").textContent = toName;
    document.getElementById("fromName").textContent = fromName;
    document.getElementById("code").textContent = secretCode;

    const today = new Date();
    document.getElementById("today").textContent =
      today.toLocaleDateString("vi-VN", { year: "numeric", month: "long", day: "numeric" });

    // Typing effect
    const typeArea = document.getElementById("typeArea");
    let i = 0;
    function typeNext() {
      typeArea.textContent = message.slice(0, i++);
      if (i <= message.length) requestAnimationFrame(typeNext);
    }
    typeNext();

    // ====== HEARTS BACKGROUND ======
    const hearts = document.getElementById("hearts");
    const HEARTS_COUNT = 28;
    for (let k = 0; k <= HEARTS_COUNT; k++) {
      const el = document.createElement("div");
      el.className = "heart";
      const left = Math.random() * 100;
      const dur = 6 + Math.random() * 8;
      const size = 10 + Math.random() * 18;
      const delay = Math.random() * 6;

      el.style.left = left + "vw";
      el.style.animationDuration = dur + "s";
      el.style.animationDelay = delay + "s";
      el.style.width = size + "px";
      el.style.height = size + "px";
      hearts.appendChild(el);
    }

    // ====== COUNTDOWN ======
    const $d = document.getElementById("d");
    const $h = document.getElementById("h");
    const $m = document.getElementById("m");
    const $s = document.getElementById("s");

    function tick() {
      const now = new Date();
      let diff = targetDate - now;
      if (diff < 0) diff = 0;

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      diff -= days * (1000 * 60 * 60 * 24);
      const hours = Math.floor(diff / (1000 * 60 * 60));
      diff -= hours * (1000 * 60 * 60);
      const mins = Math.floor(diff / (1000 * 60));
      diff -= mins * (1000 * 60);
      const secs = Math.floor(diff / 1000);

      $d.textContent = days;
      $h.textContent = hours;
      $m.textContent = mins;
      $s.textContent = secs;
    }
    tick();
    setInterval(tick, 1000);

    // ====== BUTTON BEHAVIOR ======
    const btnYes = document.getElementById("btnYes");
    const btnNo = document.getElementById("btnNo");
    const btnNote = document.getElementById("btnNote");

    const modal = document.getElementById("modal");
    const moreText = document.getElementById("moreText");
    const btnClose = document.getElementById("btnClose");
    const btnOk = document.getElementById("btnOk");
    const btnLater = document.getElementById("btnLater");

    btnNote.addEventListener("click", () => {
      // ✅ phát sound khi bấm "Đọc thêm"
      playNote();
      moreText.innerHTML = moreMessage;
      modal.classList.add("open");
    });

    btnClose.addEventListener("click", () => modal.classList.remove("open"));
    modal.addEventListener("click", (e) => {
      if (e.target === modal) modal.classList.remove("open");
    });
    // ====== 🔊 SOUND EFFECTS (meme / đồng ý / suy nghĩ thêm) ======
    const memeAudio = document.getElementById("memeAudio");
    const yesAudio = document.getElementById("yesAudio");
    const laterAudio = document.getElementById("laterAudio");
    const noteAudio = document.getElementById("noteAudio");

    // chỉnh âm lượng (0 -> 1)
    memeAudio.volume = 0.75;
    yesAudio.volume = 0.9;
    laterAudio.volume = 0.85;
    noteAudio.volume = 0.8;

    let audioUnlocked = false;

    function safePlay(audioEl) {
      try {
        audioEl.currentTime = 0;
        const p = audioEl.play();
        // tránh warning unhandled promise
        if (p && typeof p.catch === "function") p.catch(() => { });
      } catch { }
    }

    // "Warm-up" để iOS/mobile cho phép phát âm thanh sau này
    async function warmUp(audioEl) {
      try {
        audioEl.muted = true;
        const p = audioEl.play();
        if (p && typeof p.then === "function") await p;
        audioEl.pause();
        audioEl.currentTime = 0;
        audioEl.muted = false;
      } catch {
        // ignore
      }
    }

    async function unlockAudio() {
      if (audioUnlocked) return;
      // Cần 1 user-gesture (pointerdown/click) để unlock
      await warmUp(memeAudio);
      await warmUp(yesAudio);
      await warmUp(laterAudio);
      await warmUp(noteAudio);
      audioUnlocked = true;
    }

    function playMeme() {
      // gọi unlock trước, nhưng không chặn UI
      unlockAudio();
      safePlay(memeAudio);
    }

    function playYes() {
      unlockAudio();
      safePlay(yesAudio);
    }

    function playLater() {
      unlockAudio();
      safePlay(laterAudio);
    }

    function playNote() {
      unlockAudio();
      safePlay(noteAudio);
    }

    // unlock khi user chạm/click bất kỳ đâu lần đầu
    document.addEventListener("pointerdown", unlockAudio, { once: true, passive: true });

    // Nếu vẫn click được nút "Không đâu" (hiếm 😛) thì phát tiếng luôn
    btnNo.addEventListener("click", playMeme);
    btnNo.addEventListener("pointerdown", playMeme);

    // Nút "Không đâu" chạy trốn :))
    // Nút "Không đâu" chạy trốn (di chuyển mượt)
    let noButtonActive = true; // dùng để dừng vòng lặp khi đã "Đồng ý"
    let dodge = 0;
    const actionsBox = btnNo.parentElement; // .actions

    function rand(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }
    // Nút "Không đâu" né chuột LIÊN TỤC (chuột đè lên vẫn chạy)
    let tx = 0, ty = 0;

    let mouseX = -9999, mouseY = -9999;
    let cooldown = 0; // chống rung: chỉ nhảy mỗi ~120ms

    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
    function randInt(min, max) {
      if (min > max) [min, max] = [max, min];
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    // luôn cập nhật vị trí chuột (PC + mobile stylus)
    document.addEventListener("pointermove", (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
    }, { passive: true });

    function moveNoButtonAway(rect) {
      const margin = 12;       // khoảng an toàn mép màn hình
      const limX = 220;        // mức chạy ngang tối đa mỗi lần
      const limY = 90;         // mức chạy dọc tối đa mỗi lần (màn ngắn vẫn ổn)

      // dx/dy cho phép để nút vẫn nằm trong viewport
      const minDx = Math.max(-limX, margin - rect.left);
      const maxDx = Math.min(limX, window.innerWidth - margin - rect.right);
      const minDy = Math.max(-limY, margin - rect.top);
      const maxDy = Math.min(limY, window.innerHeight - margin - rect.bottom);

      // đẩy theo hướng tránh chuột (ưu tiên tránh trực tiếp)
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;

      let dx = (mouseX < cx) ? randInt(40, maxDx) : randInt(minDx, -40);
      let dy = (mouseY < cy) ? randInt(20, maxDy) : randInt(minDy, -20);

      // nếu viewport chật theo 1 trục thì chuyển sang trục còn lại
      if (maxDx < 30 && minDx > -30) dx = randInt(-limX, limX);
      if (maxDy < 20 && minDy > -20) dy = 0; // màn thấp: hạn chế tụt xuống

      // clamp lần cuối cho chắc
      dx = clamp(dx, minDx, maxDx);
      dy = clamp(dy, minDy, maxDy);

      tx += dx;
      ty += dy;

      btnNo.style.transform = `translate(${tx}px, ${ty}px)`;
      dodge++;
      btnNo.style.opacity = Math.max(0.45, 1 - dodge * 0.07);
    }

    function loop() {
      // nếu nút đã bị ẩn (hoặc đã đồng ý) thì dừng hẳn animation loop
      if (!noButtonActive || btnNo.offsetParent === null) return;

      cooldown = Math.max(0, cooldown - 16);

      const rect = btnNo.getBoundingClientRect();

      // bán kính "nguy hiểm": chuột gần là chạy (kể cả đang đè lên)
      const danger = 26; // tăng lên 40 nếu bạn muốn "nhạy" hơn

      const inside =
        mouseX >= rect.left - danger &&
        mouseX <= rect.right + danger &&
        mouseY >= rect.top - danger &&
        mouseY <= rect.bottom + danger;

      if (inside && cooldown === 0) {
        playMeme();             // ✅ phát meme sound khi user "tí nữa" chạm vào nút
        moveNoButtonAway(rect);
        cooldown = 120; // ms
      }

      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);


    // Confetti khi đồng ý
    const confetti = document.getElementById("confetti");
    function popConfetti() {
      confetti.innerHTML = "";
      const n = 120;
      for (let j = 0; j < n; j++) {
        const piece = document.createElement("i");
        const left = Math.random() * 100;
        const delay = Math.random() * 0.3;
        const dur = 2.8 + Math.random() * 1.8;
        const w = 6 + Math.random() * 10;
        const h = 10 + Math.random() * 16;

        // màu ngẫu nhiên nhưng vẫn "tông tình yêu"
        const palette = ["#ff4d6d", "#ff7a8c", "#7c3aed", "#f59e0b", "#10b981", "#3b82f6"];
        piece.style.background = palette[Math.floor(Math.random() * palette.length)];

        piece.style.left = left + "vw";
        piece.style.animationDelay = delay + "s";
        piece.style.animationDuration = dur + "s";
        piece.style.width = w + "px";
        piece.style.height = h + "px";
        piece.style.transform = `rotate(${Math.random() * 360}deg)`;
        confetti.appendChild(piece);
      }
    }

    function accept() {
      // ✅ phát sound khi "Đồng ý"
      playYes();

      // ✅ Khi đã đồng ý: ẨN nút "Không đâu", "Suy nghĩ thêm" và "Đọc thêm"
      noButtonActive = false;           // dừng loop né chuột
      btnNo.style.display = "none";     // biến mất nút Không đâu (ngoài)
      btnLater.style.display = "none";  // biến mất nút Suy nghĩ thêm (trong modal)
      btnNote.style.display = "none";   // biến mất nút Đọc thêm (ngoài)

      popConfetti();
      modal.classList.remove("open");
      typeArea.textContent =
        `Yay! 🎉
Vậy từ giờ… cho anh được gọi em là “Nhung Bếu” nha 💞

Nhắn anh một câu: “Đồng ý rồi đó!” 😚`;

      // Giữ lại nút "Đồng ý" (tắt) nếu bạn muốn
      btnYes.disabled = true;
      btnYes.style.opacity = .7;
    }

    btnYes.addEventListener("click", accept);
    btnOk.addEventListener("click", accept);
    btnLater.addEventListener("click", () => {
      // ✅ phát sound khi "Suy nghĩ thêm"
      playLater();
      modal.classList.remove("open");
      typeArea.textContent += "\n\n(Okiee, tớ đợi câu trả lời của cậu nha 🙂)";
    });
  </script>
</body>

</html>
